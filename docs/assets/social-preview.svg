<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">GOC-Base-Repo-Template social preview</title>
  <desc id="desc">High-energy GitHub template preview for Lipford-Dutch projects.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.48" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="cyan" cx="16%" cy="14%" r="70%">
      <stop offset="0" stop-color="#00E5FF" stop-opacity="0.42"/>
      <stop offset="0.48" stop-color="#00E5FF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lime" cx="86%" cy="20%" r="62%">
      <stop offset="0" stop-color="#00FF66" stop-opacity="0.36"/>
      <stop offset="0.58" stop-color="#00FF66" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#00FF66" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#cyan)"/>
  <rect width="1280" height="640" fill="url(#lime)"/>
  <path d="M0 66H1280" stroke="#00FF66" stroke-width="6"/>
  <path d="M0 574H1280" stroke="#00E5FF" stroke-width="6"/>
  <g opacity="0.22" stroke="#94a3b8" stroke-width="1">
    <path d="M70 0v640M190 0v640M310 0v640M430 0v640M550 0v640M670 0v640M790 0v640M910 0v640M1030 0v640M1150 0v640"/>
    <path d="M0 130h1280M0 250h1280M0 370h1280M0 490h1280"/>
  </g>
