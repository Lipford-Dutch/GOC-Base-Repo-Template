  <text x="82" y="388" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Docs. CI/CD. Security. Governance. Release discipline.</text>
  <text x="82" y="432" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="24">The launch pad every new Generals of Chaos project inherits.</text>
