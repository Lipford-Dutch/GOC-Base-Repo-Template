---
name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt yamllint pymarkdownlnt

      - name: Check required files
        run: |
          test -f README.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f GOVERNANCE.md
          test -f SUPPORT.md
          test -f .github/pull_request_template.md
          test -f .github/CODEOWNERS
          test -f mkdocs.yml

      - name: Lint YAML
        run: yamllint .

      - name: Lint Markdown
        run: pymarkdownlnt scan README.md docs templates reports *.md

      - name: Build documentation
        run: mkdocs build --strict
