---
site_name: Dev-System-Awesome
site_description: Lipford-Dutch reusable repository kickoff template.
site_url: https://lipford-dutch.github.io/Dev-System-Awesome/
repo_url: https://github.com/Lipford-Dutch/Dev-System-Awesome
repo_name: Lipford-Dutch/Dev-System-Awesome
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
nav:
  - Home: index.md
  - Kickoff:
      - Checklist: kickoff-checklist.md
      - Project Intake: project-intake.md
      - Ownership: ownership.md
  - Standards:
      - Repository Standards: standards.md
      - Documentation Standards: docs-standards.md
      - Security Baseline: security-baseline.md
      - CI/CD Baseline: ci-cd-baseline.md
      - Release Governance: release-governance.md
      - Operations Baseline: operations-baseline.md
  - Playbooks:
      - General Triaging Chaos: triaging-chaos.md
      - Pages and Docs: pages-docs.md
      - Template Maintenance: template-maintenance.md
  - Examples: examples.md
